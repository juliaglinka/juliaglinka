    <script type="module">
      import { main } from ./output/Main/index.js";
      main();
      
      // Swipe functionality for lightbox
      const galleryImages = [
        "./images/session-01.jpg",
        "./images/session-02.jpg",
        "./images/session-03.jpg",
        "./images/session-04.jpg",
        "./images/session-05.jpg",
        "./images/session-06.jpg",
        "./images/session-07.jpg",
        "./images/session-08.jpg",
        "./images/session-09.jpg"
      ];
      
      let touchStartX = 0;
      let touchEndX = 0;
      let currentImageIndex = 0;
      
      function findImageIndex(src) {
        return galleryImages.indexOf(src);
      }
      
      function updateImage(src) {
        const index = findImageIndex(src);
        if (index !== -1) {
          currentImageIndex = index;
        }
      }
      
      function nextImage() {
        const lightbox = document.querySelector('.fixed.inset-0.z-50');
        if (!lightbox) return;
        
        const img = lightbox.querySelector('img');
        if (!img) return;
        
        currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
        img.src = galleryImages[currentImageIndex];
      }
      
      function prevImage() {
        const lightbox = document.querySelector('.fixed.inset-0.z-50');
        if (!lightbox) return;
        
        const img = lightbox.querySelector('img');
        if (!img) return;
        
        currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
        img.src = galleryImages[currentImageIndex];
      }
      
      // Add swipe listeners after a delay to let Halogen render
      setTimeout(() => {
        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            mutation.addedNodes.forEach((node) => {
              if (node.nodeType === 1 && node.classList && node.classList.contains('fixed') && node.classList.contains('inset-0') && node.classList.contains('z-50')) {
                // Lightbox added
                const img = node.querySelector('img');
                if (img) {
                  updateImage(img.src);
                }
                
                node.addEventListener('touchstart', (e) => {
                  touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                
                node.addEventListener('touchend', (e) => {
                  touchEndX = e.changedTouches[0].screenX;
                  handleSwipe();
                }, { passive: true });
              }
            });
          });
        });
        
        observer.observe(document.body, { childList: true, subtree: true });
        
        // Also watch for img src changes in existing lightbox
        setInterval(() => {
          const lightbox = document.querySelector('.fixed.inset-0.z-50');
          if (lightbox) {
            const img = lightbox.querySelector('img');
            if (img && img.src) {
              const cleanSrc = img.src.replace(window.location.origin + '/', './');
              if (galleryImages.includes(cleanSrc)) {
                updateImage(cleanSrc);
              }
            }
          }
        }, 100);
      }, 1000);
      
      function handleSwipe() {
        const diff = touchStartX - touchEndX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) {
            nextImage();
          } else {
            prevImage();
          }
        }
      }
    </script>
